schema_version: 1
last_updated: "2026-05-20"
scope: "Representative validation set for Chinese AI research/model monitoring."
notes:
  - "This is not a complete inventory of every Chinese AI model. It is a high-signal benchmark set for testing detection, institution matching, alias matching, and significance scoring."
  - "expected_country means Chinese institutional/company affiliation, not that the paper topic is China or that the model only works in Chinese."
  - "importance scale: 5 = must-capture frontier/signature model; 4 = important model family or major modality; 3 = useful institution/alias test case."
  - "arxiv_id is null when the model is mainly validated through official product pages, GitHub/Hugging Face pages, or reputable news coverage rather than a stable arXiv technical report."

