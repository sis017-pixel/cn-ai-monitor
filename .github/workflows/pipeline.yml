name: Run paper monitor pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: [self-hosted, windows, x64, cn-ai-monitor]

    defaults:
      run:
        working-directory: paper-monitor
        shell: powershell

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Clean old generated data
        run: |
          if (Test-Path data/raw) { Remove-Item data/raw -Recurse -Force }
          if (Test-Path data/processed) { Remove-Item data/processed -Recurse -Force }
          New-Item -ItemType Directory -Force -Path data/raw | Out-Null
          New-Item -ItemType Directory -Force -Path data/processed | Out-Null

      - name: Run fetch layer
        env:
          CONTACT_EMAIL: sis017@ucsd.edu
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}

          ARXIV_BATCH_SIZE: "50"
          ARXIV_MAX_PAGES: "10"
          ARXIV_SLEEP_SECONDS: "6"
          ARXIV_RETRIES: "4"
          ARXIV_RETRY_BASE_SECONDS: "60"

          OPENALEX_MAX_PAPERS: "1500"
          OPENALEX_WORKERS: "2"
          OPENALEX_SLEEP_SECONDS: "0.35"
          OPENALEX_MIN_TITLE_SCORE: "0.85"
          OPENALEX_PER_PAGE: "10"
        run: uv run python src/paper_monitor/fetch.py

      - name: Validate fetch output
        run: |
          $latestFile = Get-ChildItem data/raw/papers_*.json -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $latestFile) {
            Write-Error "fetch.py did not create any raw paper file."
            exit 1
          }

          $count = python -c "import json; print(len(json.load(open(r'$($latestFile.FullName)', encoding='utf-8'))))"
          Write-Host "Fetched paper count: $count"

          if ([int]$count -eq 0) {
            Write-Error "fetch.py produced zero papers."
            exit 1
          }

      - name: Find latest raw paper file
        id: latest_raw
        run: |
          $latestFile = Get-ChildItem data/raw/papers_*.json | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $relative = "data/raw/" + $latestFile.Name
          "latest_file=$relative" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Latest raw file: $relative"

      - name: Run classification layer
        run: uv run python src/paper_monitor/classify.py --input "${{ steps.latest_raw.outputs.latest_file }}"

      - name: Validate classification output
        run: |
          $latestFile = Get-ChildItem data/processed/selected_papers_*.json -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $latestFile) {
            Write-Error "classify.py did not create selected_papers_*.json."
            exit 1
          }

          $count = python -c "import json; print(len(json.load(open(r'$($latestFile.FullName)', encoding='utf-8'))))"
          Write-Host "Selected paper count: $count"

      - name: Find latest selected paper file
        id: latest_selected
        run: |
          $latestFile = Get-ChildItem data/processed/selected_papers_*.json | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $relative = "data/processed/" + $latestFile.Name
          "latest_file=$relative" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Latest selected file: $relative"

      - name: Run Claude verification layer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: "claude-sonnet-4-5-20250929"
          ANTHROPIC_TEMPERATURE: "0"
          ANTHROPIC_MAX_TOKENS: "1200"
          ANTHROPIC_RETRIES: "3"
          ANTHROPIC_RETRY_BASE_SECONDS: "10"
          ANTHROPIC_SLEEP_SECONDS: "0.5"
          CLAUDE_VERIFY_TOP: "0"
          CLAUDE_INCLUDE_LIKELY: "true"
        run: uv run python src/paper_monitor/verify.py --input "${{ steps.latest_selected.outputs.latest_file }}"

      - name: Run summary layer
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          USE_DEEPSEEK_SUMMARY: "true"
          DEEPSEEK_MODEL: "deepseek-v4-flash"
          DEEPSEEK_TEMPERATURE: "0.0"
          DEEPSEEK_MAX_TOKENS: "1400"
          DEEPSEEK_SLEEP_SECONDS: "0.5"
          DEEPSEEK_RETRIES: "3"
          DEEPSEEK_RETRY_BASE_SECONDS: "10"
        run: uv run python src/paper_monitor/summarize.py --input "${{ steps.latest_selected.outputs.latest_file }}"

      - name: Validate summary output
        run: |
          $latestJson = Get-ChildItem data/processed/summaries_*.json -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $latestMd = Get-ChildItem data/processed/summaries_*.md -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $latestJson) {
            Write-Error "summarize.py did not create summaries_*.json."
            exit 1
          }

          if (-not $latestMd) {
            Write-Error "summarize.py did not create summaries_*.md."
            exit 1
          }

          $count = python -c "import json; print(len(json.load(open(r'$($latestJson.FullName)', encoding='utf-8'))))"
          Write-Host "Summary count: $count"
          Write-Host "Summary JSON: $($latestJson.FullName)"
          Write-Host "Summary Markdown: $($latestMd.FullName)"

      - name: Run final publishing layer
        run: uv run python src/paper_monitor/publish.py

      - name: Upload raw and processed data
        uses: actions/upload-artifact@v4
        with:
          name: paper-monitor-data
          path: |
            paper-monitor/data/raw/*.json
            paper-monitor/data/processed/*.json
            paper-monitor/data/processed/*.md
            paper-monitor/data/processed/verification_results_*.json
            paper-monitor/data/processed/verified_papers_*.json
            paper-monitor/data/processed/verification_report_*.md